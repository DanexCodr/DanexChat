name: Training Pipeline

on:
  workflow_dispatch:
    inputs:
      base_model:
        description: "Base model id or local path"
        required: false
        default: "HuggingFaceTB/SmolLM2-135M-Instruct"
      sparsity:
        description: "Global pruning sparsity (0.0 - 1.0)"
        required: false
        default: "0.20"
      workdir:
        description: "Output working directory"
        required: false
        default: "training/artifacts"

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: training/requirements.txt

      - name: Install training dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r training/requirements.txt

      - name: Validate workflow inputs
        run: |
          python - <<'PY'
          try:
              sparsity = float("${{ inputs.sparsity }}")
          except ValueError as exc:
              raise SystemExit(f"Invalid sparsity value: {exc}")
          if not (0.0 <= sparsity <= 1.0):
              raise SystemExit("sparsity must be between 0.0 and 1.0")
          print(f"Validated sparsity={sparsity}")
          PY

      - name: Run training pipeline
        run: |
          echo "Using GitHub-hosted CPU runner (ubuntu-latest); training may take significant time."
          bash training/run_pipeline.sh \
            "${{ inputs.base_model }}" \
            "${{ inputs.sparsity }}" \
            "${{ inputs.workdir }}"

      - name: Upload training artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: training-artifacts
          path: ${{ inputs.workdir }}
          if-no-files-found: ignore
