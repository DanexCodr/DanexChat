name: Build APK

on:
  workflow_dispatch:
  push:
    paths:
      - "app/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download SmolLM2 bundled assets
        run: |
          mkdir -p app/src/main/assets/smollm2
          curl -fL --retry 3 --retry-delay 5 \
            -o app/src/main/assets/smollm2/model_q4.onnx \
            "https://huggingface.co/onnx-community/SmolLM2-135M-Instruct/resolve/main/onnx/model_q4.onnx"
          curl -fL --retry 3 --retry-delay 5 \
            -o app/src/main/assets/smollm2/tokenizer.json \
            "https://huggingface.co/HuggingFaceTB/SmolLM2-135M-Instruct/resolve/main/tokenizer.json"
          test -s app/src/main/assets/smollm2/model_q4.onnx
          test -s app/src/main/assets/smollm2/tokenizer.json

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        id: upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: danexchat-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Add artifact link to workflow summary
        run: |
          echo "APK artifact: ${{ steps.upload-artifact.outputs.artifact-url }}" >> "$GITHUB_STEP_SUMMARY"
