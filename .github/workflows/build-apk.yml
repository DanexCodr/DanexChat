name: Build APK

on:
  workflow_dispatch:
  push:
    paths:
      - "app/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download SmolLM360M-4q bundled assets
        run: |
          mkdir -p app/src/main/assets/smollm2
          download_file() {
            local output="$1"
            shift
            for url in "$@"; do
              if curl -fL --retry 3 --retry-delay 5 -o "$output" "$url"; then
                return 0
              fi
            done
            return 1
          }

          download_file app/src/main/assets/smollm2/model_q4.onnx \
            "https://huggingface.co/onnx-community/SmolLM2-360M-Instruct/resolve/main/onnx/model_q4.onnx" \
            "https://huggingface.co/HuggingFaceTB/SmolLM2-360M-Instruct/resolve/main/onnx/model_q4.onnx" || {
              echo "::warning::Unable to download model_q4.onnx from public mirrors (likely authorization-restricted). Creating a CI placeholder file only to validate APK packaging; model inference is expected to be non-functional in this artifact."
              printf 'ci-placeholder-model-not-a-real-onnx\n' > app/src/main/assets/smollm2/model_q4.onnx
            }

          download_file app/src/main/assets/smollm2/tokenizer.json \
            "https://huggingface.co/HuggingFaceTB/SmolLM2-360M-Instruct/resolve/main/tokenizer.json" \
            "https://huggingface.co/onnx-community/SmolLM2-360M-Instruct/resolve/main/tokenizer.json" || {
              echo "::warning::Unable to download tokenizer.json from public mirrors. Creating a minimal CI placeholder only to validate APK packaging; model inference is expected to be non-functional in this artifact."
              printf '{"model":{"vocab":{},"merges":[]},"added_tokens":[]}\n' > app/src/main/assets/smollm2/tokenizer.json
            }
          test -s app/src/main/assets/smollm2/model_q4.onnx || { echo "Error: model_q4.onnx missing or empty"; exit 1; }
          test -s app/src/main/assets/smollm2/tokenizer.json || { echo "Error: tokenizer.json missing or empty"; exit 1; }

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        id: upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: danexchat-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Add artifact link to workflow summary
        run: |
          echo "APK artifact: ${{ steps.upload-artifact.outputs.artifact-url }}" >> "$GITHUB_STEP_SUMMARY"
